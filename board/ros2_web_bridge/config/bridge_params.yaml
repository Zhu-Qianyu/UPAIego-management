web_bridge_node:
  ros__parameters:
    mode: "supabase"
    base_url: "http://127.0.0.1:8000"
    supabase_url: "https://your-project-ref.supabase.co"
    supabase_key: "replace-with-your-supabase-key"
    supabase_table: "devices"
    device_id: "replace-with-device-id"
    poll_interval_sec: 10.0
    request_timeout_sec: 5.0
    firmware_version: "ros2-dev"
    status: "active"
    record_on_startup: true
    recording_device: "/dev/video0"
    recording_dir: "/home/cat/videos"
    recording_resolution: "2560x720"
    recording_fps: 60
    recording_bitrate: "5000k"
    ffmpeg_codec: "h264_rkmpp"
    frame_upload_interval_sec: 60
    frame_max_width: 640
    frame_jpeg_quality: 6
    # MPU6050 陀螺仪（与录像同时启停；见 board/README.md）
    gyro_enable: true
    gyro_i2c_bus: 7
    gyro_sample_interval_sec: 0.01
